<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>operators</title>
</head>
<body>
    


    <script>

     console.log("Operators in js ")

let a =50;
let b =20;
 
console.log("a + b =", a+b);
console.log("a - b =", a-b);
console.log("a * b =", a*b);
console.log("a / b =", a/b)
console.log("a ** b =", a**b)
console.log("a % b =", a%b)
console.log("++a =", ++a)
console.log("b++ =", b++)
console.log("--a =", --a)
console.log("b-- =", b--)

    </script>
</body>
</html>
