<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conditional</title>
</head>
<body>
    
<h2>This is the condtional expression </h2>

<script>

let a = prompt("obtained marks ?");
a = Number.parseInt(a);

// this is the simple if else condition 
if(a<35){
    alert("you are fail in exam ")
}

else{
   alert("you are pass in exam ")
}


// this is the if else if condition 

if(a>=0 && a<=34){
    alert("Better luck next time ")

}
else if (a>=35 && a<=74){
    alert("you are passed the exam with A grade")
}

else if (a>=75 && a<=100){
    alert("you are passed the exam with A+ grade ")
}

else{
    alert("input is not valid ")
}

</script>

</body>
</html>
